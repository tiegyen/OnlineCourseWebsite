<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | English Mastery</title>
    <link href="../css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header" style="padding-bottom: 20px;">
        <div class="container">
            <div class="navbar">
                <div class="logo"><img src="../images/logo-one.png" width="125px" alt="Logo" /></div>
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="courses.html">Courses</a></li>
                        <li><a href="register.html">Register</a></li>
                        <li><a href="login.html">Login</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="container mt-50 mb-50" style="max-width: 450px;">
        <div class="card-box" style="padding: 40px;">
            <h2 class="text-center" style="margin-bottom: 30px; color: #333;">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="emailInput" class="form-control" placeholder="admin@course.com hoặc student1@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="123456" required>
                </div>

                <div class="login-utilities">
                    <label class="remember-me-label">
                        <input type="checkbox" class="remember-checkbox"> Remember Me
                    </label>
                    <a href="#" class="text-link" style="font-size: 14px;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-20">Sign In</button>
            </form>
            <p class="text-center mt-20" style="color: #666; font-size: 14px;">
                New to English Mastery? <a href="register.html" class="text-link">Register here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;

            if (email === 'admin@course.com') {
                alert('Welcome Admin!');
                window.location.href = '../Admin/dashboard.html';
            } else if (email.includes('student')) {
                alert('Welcome Student!');
                window.location.href = '../Student/profile.html';
            } else {
                alert('Invalid email or password!');
            }
        });
    </script>
</body>
</html>
