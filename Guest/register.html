<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | English Mastery</title>
    <link href="../css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header" style="padding-bottom: 20px;">
        <div class="container">
            <div class="navbar">
                <div class="logo"><img src="./images/logo-one.png" width="125px" alt="Logo" /></div>
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="courses.html">Courses</a></li>
                        <li><a href="register.html">Register</a></li>
                        <li><a href="login.html">Login</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="container mt-50 mb-50" style="max-width: 500px;">
        <div class="card-box" style="padding: 40px;">
            <h2 class="text-center" style="margin-bottom: 30px; color: #333;">Create Account</h2>
            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name" required>
                    <span class="validation-error"></span>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                    <span class="validation-error"></span>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Create password" required>
                    <span class="validation-error"></span>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm password" required>
                    <span class="validation-error"></span>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-20">Register Now</button>
            </form>
            <p class="text-center mt-20" style="color: #666; font-size: 14px;">
                Already have an account? <a href="login.html" class="text-link">Login here</a>
            </p>
        </div>
    </div>

</body>
</html>
