<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Courses | English Mastery</title>
    <link href="../css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <div class="header" style="padding-bottom: 0;">
        <div class="container">
            <div class="navbar">
                <div class="logo">
                    <img src="../images/logo-one.png" width="125px" alt="Logo" />
                </div>
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="mycourses.html">My Courses</a></li>
                        <li><a href="payment.html">Payment</a></li>
                        <li><a href="profile.html" class="student-welcome"><i class="fa fa-user-circle"></i> Welcome, Student</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="small-container mt-50">
        <h2 class="title">Explore Our Courses</h2>

        <div class="filter-container">
            <div class="search-block">
                <input type="text" class="form-control" placeholder="Search course by name or instructor...">
            </div>
            <div class="filter-block mt-15">
                <select class="form-control filter-select">
                    <option value="">All Categories</option>
                    <option value="ielts">IELTS Preparation</option>
                    <option value="toeic">TOEIC Training</option>
                    <option value="business">Business English</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-4 card-box course-item-card">
                <img src="../images/picture1.jpg" alt="IELTS">
                <span class="category-badge">IELTS Preparation</span>
                <h4 class="mt-15 course-card-title">IELTS Foundation</h4>
                <p class="course-card-instructor">Instructor: John Smith</p>
                <p class="course-card-price">1,500,000 VND</p>

                <div class="row mt-15 course-card-actions">
                    <a href="payment.html" class="btn btn-primary btn-enroll">Enroll Now</a>
                    <a href="details.html" class="text-link link-details">Details</a>
                </div>
            </div>

        </div>

        <div class="row mt-50 pagination-wrapper">
            <div class="pagination-list">
                <span class="page-item active">1</span>
                <span class="page-item">2</span>
                <span class="page-item">3</span>
                <span class="page-item">&#10132;</span>
            </div>
        </div>
    </div>

    <div class="footer mt-50">
        <div class="container">
            <hr />
            <p class="copyright">Copyright 2026 - Team 03 - English Mastery Portal</p>
        </div>
    </div>

</body>
</html>
