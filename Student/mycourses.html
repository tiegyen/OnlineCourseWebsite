<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses | English Mastery</title>
    <link href="../css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <div class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo">
                    <img src="../images/logo-one.png" width="125px" alt="Logo" />
                </div>
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="mycourses.html">My Courses</a></li>
                        <li><a href="payment.html">Payment</a></li>
                        <li><a href="profile.html"><i class="fa fa-user-circle"></i> Welcome, Student</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="small-container mt-50 mb-50">
        <h2 class="title">My Enrolled Courses</h2>

        <div class="row">
            <div class="col-4 card-box">
                <img src="../images/picture1.jpg" alt="IELTS">
                <h4 style="margin-top: 15px;">IELTS Foundation</h4>
                <p style="font-size: 14px; color: #777;">Instructor: John Smith</p>

                <div style="margin: 15px 0;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                        <span id="progress-text-1">Progress</span>
                        <span id="progress-val-1">33%</span>
                    </div>
                    <div style="background: #e2e8f0; height: 8px; border-radius: 4px;">
                        <div id="progress-bar-1" class="progress-bar-fill" style="width: 0%;"></div>
                    </div>
                </div>

                <a href="learning.html" class="btn btn-primary w-100">Continue Learning</a>
            </div>

            <div class="col-4 card-box">
                <img src="../images/picture2.jpg" alt="Business English">
                <h4 style="margin-top: 15px;">Business English</h4>
                <p style="font-size: 14px; color: #777;">Instructor: Jane Doe</p>

                <div style="margin: 15px 0;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                        <span>Progress</span>
                        <span>0%</span>
                    </div>
                    <div style="background: #e2e8f0; height: 8px; border-radius: 4px;">
                        <div style="width: 0%; height: 100%; background: #2ecc71; border-radius: 4px;"></div>
                    </div>
                </div>
                <a href="#" class="btn btn-primary w-100">Start Learning</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <hr />
            <p class="copyright">Copyright 2026 - Team 03 - English Mastery Portal</p>
        </div>
    </div>

    <!--test progress-->
    <script>
    // Hàm này giả lập việc "Load data từ database" sau khi trang web tải xong
    window.onload = function() {
        // Sau 0.5 giây, thanh tiến độ sẽ tự chạy từ 0 lên 33%
        setTimeout(() => {
            const progressBar = document.getElementById('progress-bar-1');
            progressBar.style.width = '33%'; // Giá trị này sau này sẽ là data thật từ DB
        }, 500);
    };
    </script>

</body>
</html>
