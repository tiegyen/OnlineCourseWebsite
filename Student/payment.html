<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History | English Mastery</title>
    <link href="../css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <div class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo">
                    <img src="../images/logo-one.png" width="125px" alt="Logo" />
                </div>

                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="mycourses.html">My Courses</a></li>
                        <li><a href="payment.html">Payment</a></li>
                        <li>
                            <a href="profile.html">
                                <i class="fa fa-user-circle"></i> Welcome, Student
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="small-container mt-50 mb-50">

        <h2 class="title">Payment History</h2>

        <div class="card-box">

            <h3 class="mb-20">
                <i class="fa fa-history"></i> Invoice History
            </h3>

            <div class="table-responsive">
                <table class="table-payment">

                    <thead>
                        <tr>
                            <th>Invoice ID</th>
                            <th>Course Name</th>
                            <th>Amount</th>
                            <th>Payment Method</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr>
                            <td class="invoice-id">#INV-0001</td>
                            <td>IELTS Foundation</td>
                            <td class="invoice-amount">1,500,000 VND</td>
                            <td>VNPay</td>
                            <td>
                                <span class="badge badge-paid">Paid</span>
                            </td>
                        </tr>

                        <tr>
                            <td class="invoice-id">#INV-0002</td>
                            <td>Business English</td>
                            <td class="invoice-amount">1,000,000 VND</td>
                            <td>VNPay</td>
                            <td>
                                <span class="badge badge-paid">Paid</span>
                            </td>
                        </tr>

                    </tbody>

                </table>
            </div>

        </div>

    </div>

    <div class="footer">
        <div class="container">
            <hr />
            <p class="copyright">
                Copyright 2026 - Team 03 - English Mastery Portal
            </p>
        </div>
    </div>
