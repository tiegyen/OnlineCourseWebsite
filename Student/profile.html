<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | English Mastery</title>

    ```
    <link href="../css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    ```

</head>
<body>

    ```
    <div class="header" style="padding-bottom: 0;">
        <div class="container">

            <div class="navbar">
                <div class="logo">
                    <img src="../images/logo-one.png" width="125px" alt="Logo" />
                </div>

                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="mycourses.html">My Courses</a></li>
                        <li><a href="payment.html">Payment</a></li>
                        <li>
                            <a href="profile.html" class="student-welcome">
                                <i class="fa fa-user-circle"></i> Welcome, Student
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

        </div>
    </div>

    <div class="small-container mt-50 mb-50">

        <div class="row align-start">

            <!-- LEFT COLUMN -->

            <div class="col-2" style="flex: 0.8; padding-right: 15px;">

                <div class="card-box profile-sidebar-card">

                    <div class="profile-avatar-wrapper">
                        <img src="../images/user-1.png"
                             alt="Student Avatar"
                             class="profile-avatar-img">

                        <label for="avatar-input" class="avatar-upload-btn">
                            <i class="fa fa-camera"></i>
                        </label>

                        <input type="file"
                               id="avatar-input"
                               style="display:none;">
                    </div>

                    <div class="profile-main-info">
                        <h3>Alice Pham</h3>

                        <p>
                            Student ID:
                            <span id="display-student-id">
                                #STU-0001
                            </span>
                        </p>

                        <p class="mt-15">
                            Member since:
                            <span>Jan 2026</span>
                        </p>
                    </div>

                </div>

            </div>

            <!-- RIGHT COLUMN -->

            <div class="col-2" style="flex: 1.2;">

                <!-- PERSONAL INFORMATION -->

                <div class="card-box">

                    <h3 class="profile-section-title">
                        <i class="fa fa-edit"></i>
                        Personal Information
                    </h3>

                    <form>

                        <div class="form-group">
                            <label>Full Name</label>

                            <input type="text"
                                   class="form-control"
                                   value="Alice Pham">
                        </div>

                        <div class="form-group">
                            <label>Email Address</label>

                            <input type="email"
                                   class="form-control"
                                   value="student1@gmail.com"
                                   disabled>

                            <small class="form-text-muted">
                                <i class="fa fa-info-circle"></i>
                                Email cannot be changed.
                            </small>
                        </div>

                        <div class="form-group">
                            <label>Phone Number</label>

                            <input type="text"
                                   class="form-control"
                                   value="0901111111">
                        </div>

                        <div class="form-group">
                            <label>Address</label>

                            <input type="text"
                                   class="form-control"
                                   value="Ho Chi Minh City">
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">
                            Update Profile
                        </button>

                    </form>

                </div>

                <!-- PASSWORD -->

                <div class="card-box password-update-card">

                    <h3 class="profile-section-title">
                        <i class="fa fa-lock"></i>
                        Security & Password
                    </h3>

                    <form>

                        <div class="form-group">
                            <label>Current Password</label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Enter current password">
                        </div>

                        <div class="form-group">
                            <label>New Password</label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Enter new password">
                        </div>

                        <div class="form-group">
                            <label>Confirm New Password</label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Confirm new password">
                        </div>

                        <button type="submit"
                                class="btn btn-dark w-100">
                            Change Password
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">
        <div class="container">

            <hr />

            <p class="copyright">
                Copyright 2026 - Team 03 - English Mastery Portal
            </p>

        </div>
    </div>
    ```

</body>
</html>
