<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | English Mastery</title>
    <link href="../css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <div class="header" style="padding-bottom: 0;">
        <div class="container">
            <div class="navbar">
                <div class="logo">
                    <img src="../images/logo-one.png" width="125px" alt="Logo" />
                </div>
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="mycourses.html">My Courses</a></li>
                        <li><a href="payment.html">Payment</a></li>
                        <li><a href="profile.html" class="student-welcome"><i class="fa fa-user-circle"></i> Welcome, Student</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="small-container mt-50 mb-50">
        <div class="row align-start">

            <div class="col-2" style="flex: 0.8; padding-right: 15px;">
                <div class="card-box profile-sidebar-card">
                    <div class="profile-avatar-wrapper">
                        <img src="../images/user-1.png" alt="Student Avatar" class="profile-avatar-img">
                        <label for="avatar-input" class="avatar-upload-btn">
                            <i class="fa fa-camera"></i>
                        </label>
                        <input type="file" id="avatar-input" style="display: none;">
                    </div>
                    <div class="profile-main-info">
                        <h3>Student Name</h3>
                        <p>Student ID: #STU-2026</p>
                        <p class="mt-15">Member since: Jan 2026</p>
                    </div>
                </div>
            </div>

            <div class="col-2" style="flex: 1.2;">

                <div class="card-box">
                    <h3 class="profile-section-title"><i class="fa fa-edit"></i> Personal Information</h3>
                    <form>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" class="form-control" value="Student Name">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-control" value="student@example.com" disabled>
                            <small class="validation-error">Email cannot be changed.</small>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" class="form-control" placeholder="0123 456 789">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Update Profile</button>
                    </form>
                </div>

                <div class="card-box password-update-card">
                    <h3 class="profile-section-title"><i class="fa fa-lock"></i> Security & Password</h3>
                    <form>
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" class="form-control" placeholder="Enter current password">
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" class="form-control" placeholder="Enter new password">
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" class="form-control" placeholder="Confirm new password">
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Change Password</button>
                    </form>
                </div>

            </div>

        </div>
    </div>

    <div class="footer">
        <div class="container">
            <hr />
            <p class="copyright">Copyright 2026 - Team 03 - English Mastery Portal</p>
        </div>
    </div>

</body>
</html>
