<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | English Mastery</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet" />
</head>
<body>

    <div class="header" style="padding-bottom: 20px;">
        <div class="container text-center">
            <h2 style="color: white; margin-top: 30px;">Create Your Account</h2>
        </div>
    </div>

    <div class="container" style="max-width: 500px; margin-top: 50px; margin-bottom: 50px;">
        <div class="panel panel-default" style="padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            <form action="#" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Register Now</button>
            </form>
            <hr>
            <p class="text-center">
                Already have an account?
                <a href="login.html" style="color: #2c3e50; font-weight: bold;">Login here</a>
            </p>
        </div>
    </div>

</body>
</html>
