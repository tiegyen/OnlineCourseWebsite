<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | English Mastery</title>
    <link href="css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header" style="padding-bottom: 20px;">
        <div class="container">
            <div class="navbar">
                <div class="logo"><img src="./images/logo-one.png" width="125px" alt="Logo" /></div>
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="courses.html">Courses</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                        <li><a href="register.html">Register</a></li>
                        <li><a href="login.html">Login</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="container" style="max-width: 450px; margin-top: 80px; margin-bottom: 80px;">
        <div style="box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 40px; border-radius: 10px; background: #fff;">
            <h2 style="text-align: center; margin-bottom: 30px; color: #333;">Welcome Back</h2>
            <form>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: #555; font-weight: 500;">Email Address</label>
                    <input type="email" placeholder="Enter your email" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit;" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: #555; font-weight: 500;">Password</label>
                    <input type="password" placeholder="Enter password" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit;" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin: 10px 0 0; background-color: #2c3e50;">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: #666; font-size: 14px;">
                New to English Mastery? <a href="register.html" style="color: #ff523b; font-weight: 600;">Register here</a>
            </p>
        </div>
    </div>

</body>
</html>
